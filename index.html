
<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albumi – kuuntele puhelimella</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #f5f5f5;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }
    .cover {
      width: 100%;
      max-width: 420px;
      display: block;
      margin: 0 auto 20px auto;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    h1, p {
      text-align: center;
    }
    .playerbox {
      background: #1a1a1a;
      padding: 16px;
      border-radius: 12px;
      margin: 20px 0;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
    .tracks {
      list-style: none;
      padding: 0;
      margin: 20px 0 0 0;
    }
    .tracks li {
      margin: 8px 0;
    }
    .tracks button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #2a2a2a;
      color: #fff;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
    }
    .tracks button:hover {
      background: #3a3a3a;
    }
    .download {
      text-align: center;
      margin-top: 20px;
    }
    .download a {
      display: inline-block;
      padding: 12px 16px;
      background: #4caf50;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
    .note {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="cover.jpg" alt="Albumin kansi" class="cover" />

    <h1>Kohti taivasta</h1>
    <p>Kuuntele levy puhelimella</p>

    <div class="playerbox">
      <p><strong>Nyt soi:</strong> <span id="nowPlaying">Valitse kappale listasta</span></p>

      <audio id="audioPlayer" controls preload="none">
        <source id="audioSource" src="" type="audio/mpeg" />
        Selaimesi ei tue audiosoittinta.
      </audio>
    </div>

    <ul class="tracks">
      <li><button onclick="playTrack('01.mp3', '1. Kultakaupunkiin')">1. Kultakaupunkiin</button></li>
      <li><button onclick="playTrack('02.mp3', '2. Ensin tahdon nähdä Jeesuksen')">2. Ensin tahdon nähdä Jeesuksen</button></li>
      <li><button onclick="playTrack('03.mp3', '3. Armolahjat arkeen')">3. Armolahjat arkeen</button></li>
      <li><button onclick="playTrack('04.mp3', '4. Kun kutsun kuulen')">4. Kun kutsun kuulen</button></li>
      <li><button onclick="playTrack('05.mp3', '5. Elämäin niin pian haihtuu pois')">5. Elämäin niin pian haihtuu pois</button></li>
      <li><button onclick="playTrack('06.mp3', '6. Ken mä oon?')">6. Ken mä oon?</button></li>
      <li><button onclick="playTrack('07.mp3', '7. Hän on voimallinen')">7. Hän on voimallinen</button></li>
      <li><button onclick="playTrack('08.mp3', '8. Läpi elonpellon')">8. Läpi elonpellon</button></li>
      <li><button onclick="playTrack('09.mp3', '9. Täältä puolehen ylhäisen maan')">9. Täältä puolehen ylhäisen maan</button></li>
      <li><button onclick="playTrack('10.mp3', '10. Tummat Pilvet')">10. Tummat Pilvet</button></li>
      <li><button onclick="playTrack('11.mp3', '11. Näky')">11. Näky</button></li>
      <li><button onclick="playTrack('12.mp3', '12. Pitkän päivän ilta')">12. Pitkän päivän ilta</button></li>
      
    </ul>

    <div class="download">
      <a href="02.mp3" download>Lataa esimerkkikappale</a>
    </div>

    <div class="note">
      
    </div>
  </div>

  <script>
    function playTrack(file, title) {
      const player = document.getElementById('audioPlayer');
      const source = document.getElementById('audioSource');
      const nowPlaying = document.getElementById('nowPlaying');

      source.src = file;
      player.load();
      player.play();
      nowPlaying.textContent = title;
    }
  </script>
</body>
</html>
